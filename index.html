<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 图鉴</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #12121a;
  --bg3: #1a1a26;
  --surface: #1e1e2e;
  --border: #2a2a3a;
  --text: #e0e0e8;
  --text2: #8888a0;
  --accent: #7c6aef;
  --accent2: #a78bfa;
  --accent-glow: rgba(124,106,239,0.15);
  --danger: #ef4444;
  --radius: 10px;
  --font: 'Noto Sans SC', sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(124,106,239,0.06) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(167,139,250,0.04) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 32px;
}
.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}
.stats-bar {
  display: flex;
  gap: 24px;
  font-size: 13px;
  color: var(--text2);
  font-family: var(--mono);
}
.stat-item span { color: var(--accent2); font-weight: 500; }

.tabs {
  max-width: 1400px;
  margin: 24px auto 0;
  padding: 0 32px;
  display: flex;
  gap: 8px;
}
.tab {
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tab:hover { border-color: var(--accent); color: var(--text); }
.tab.active {
  background: var(--accent-glow);
  border-color: var(--accent);
  color: var(--accent2);
}
.tab-count {
  background: var(--bg3);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 12px;
  font-family: var(--mono);
}
.tab.active .tab-count { background: rgba(124,106,239,0.2); }

.gallery-wrap {
  max-width: 1400px;
  margin: 24px auto;
  padding: 0 32px 80px;
  position: relative;
  z-index: 1;
}
.gallery {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
}
@media (max-width: 1100px) { .gallery { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 768px)  { .gallery { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .gallery { grid-template-columns: 1fr; } }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
  cursor: pointer;
  animation: cardIn 0.4s ease both;
}
.card:hover {
  transform: translateY(-4px);
  border-color: var(--accent);
  box-shadow: 0 8px 32px rgba(124,106,239,0.12);
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}

.card-img-wrap {
  width: 100%;
  aspect-ratio: 1;
  overflow: hidden;
  background: var(--bg3);
  position: relative;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.4s;
}
.card:hover .card-img-wrap img { transform: scale(1.05); }

.blur-overlay {
  position: absolute;
  inset: 0;
  background: rgba(10,10,15,0.5);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
}
.blur-overlay .blur-hint {
  font-size: 12px;
  color: var(--text2);
  background: rgba(30,30,46,0.8);
  padding: 4px 12px;
  border-radius: 6px;
  font-family: var(--mono);
}

.card-info {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.card-filename {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.card-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
  color: var(--text2);
}
.card-tag {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
  font-weight: 500;
  font-family: var(--mono);
}
.tag-novelai  { background: rgba(239,68,68,0.15); color: #f87171; }
.tag-comfyui  { background: rgba(34,197,94,0.15); color: #4ade80; }
.tag-webui    { background: rgba(59,130,246,0.15); color: #60a5fa; }
.tag-unknown  { background: rgba(136,136,160,0.15); color: #8888a0; }
.tag-default  { background: rgba(167,139,250,0.15); color: #a78bfa; }

.card-qq {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--accent2);
  cursor: pointer;
  transition: color 0.2s;
}
.card-qq:hover { color: var(--accent); text-decoration: underline; }

.pagination {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
  margin-top: 32px;
}
.page-btn {
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text2);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--mono);
}
.page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.page-btn:disabled { opacity: 0.3; cursor: not-allowed; }
.page-info {
  font-size: 13px;
  color: var(--text2);
  padding: 0 12px;
  font-family: var(--mono);
}

/* Metadata Tooltip */
.meta-tooltip {
  position: fixed;
  z-index: 500;
  width: 400px;
  max-height: 45vh;
  background: var(--bg2);
  border: 1px solid var(--accent);
  border-radius: 10px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.5), 0 0 20px rgba(124,106,239,0.1);
  overflow: hidden;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s;
  display: flex;
  flex-direction: column;
}
.meta-tooltip.visible { opacity: 1; pointer-events: auto; }
.meta-tooltip-header {
  padding: 10px 14px;
  background: var(--bg3);
  border-bottom: 1px solid var(--border);
  font-size: 12px;
  font-family: var(--mono);
  color: var(--accent2);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}
.meta-tooltip-body {
  padding: 12px 14px;
  overflow-y: auto;
  flex: 1;
  min-height: 0;
}
.meta-tooltip-body::-webkit-scrollbar { width: 4px; }
.meta-tooltip-body::-webkit-scrollbar-track { background: transparent; }
.meta-tooltip-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.meta-row {
  margin-bottom: 10px;
}
.meta-row:last-child { margin-bottom: 0; }
.meta-label {
  font-size: 10px;
  font-family: var(--mono);
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 4px;
}
.meta-value {
  font-size: 11px;
  font-family: var(--mono);
  color: var(--text);
  line-height: 1.6;
  word-break: break-all;
  white-space: pre-wrap;
  background: var(--bg);
  padding: 6px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
}
.meta-loading {
  text-align: center;
  padding: 20px;
  color: var(--text2);
  font-size: 12px;
  font-family: var(--mono);
}
.meta-loading .mini-spinner {
  display: inline-block;
  width: 14px;
  height: 14px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@media (max-width: 768px) {
  .meta-tooltip { display: none !important; }
}

/* Search Bar */
.search-bar {
  max-width: 1400px;
  margin: 16px auto 0;
  padding: 0 32px;
}
.search-inner {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 6px 12px;
  transition: border-color 0.2s;
}
.search-inner:focus-within { border-color: var(--accent); }
.search-icon { font-size: 16px; flex-shrink: 0; }
.search-input {
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 14px;
  font-family: var(--mono);
  padding: 6px 4px;
  min-width: 0;
}
.search-input::placeholder { color: var(--text2); }
.search-btn {
  padding: 6px 16px;
  border-radius: 6px;
  border: 1px solid var(--accent);
  background: var(--accent-glow);
  color: var(--accent2);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.search-btn:hover { background: var(--accent); color: #fff; }
.search-clear-btn {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg3);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.search-clear-btn:hover { border-color: var(--danger); color: var(--danger); }
.search-result-hint {
  max-width: 1400px;
  margin: 12px auto 0;
  padding: 0 32px;
  font-size: 13px;
  color: var(--text2);
  font-family: var(--mono);
}
.search-result-hint span { color: var(--accent2); font-weight: 500; }

/* Footer */
.site-footer {
  position: relative;
  z-index: 1;
  border-top: 1px solid var(--border);
  padding: 24px 32px;
  text-align: center;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.8;
  background: rgba(10,10,15,0.6);
}
.site-footer .footer-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.site-footer .source-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 6px;
  background: var(--accent-glow);
  border: 1px solid rgba(124,106,239,0.2);
  color: var(--accent2);
  font-weight: 500;
  font-size: 12px;
  font-family: var(--mono);
}
.site-footer .dev-credit {
  font-size: 12px;
  color: var(--text2);
}
.site-footer .dev-credit span {
  color: var(--accent2);
  font-weight: 500;
}

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: rgba(0,0,0,0.92);
  backdrop-filter: blur(8px);
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 16px;
  animation: fadeIn 0.2s;
}
.lightbox.open { display: flex; }
@keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

.lightbox img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: 8px;
  box-shadow: 0 0 60px rgba(124,106,239,0.15);
}
.lightbox-info {
  color: var(--text2);
  font-size: 13px;
  font-family: var(--mono);
  text-align: center;
  max-width: 700px;
  line-height: 1.6;
}
.lightbox-info span { color: var(--accent2); }

.lb-download-btn {
  display: inline-block;
  margin-top: 12px;
  padding: 8px 24px;
  border-radius: 8px;
  border: 1px solid var(--accent);
  background: var(--accent-glow);
  color: var(--accent2);
  font-size: 13px;
  font-family: var(--mono);
  font-weight: 500;
  text-decoration: none;
  cursor: pointer;
  transition: all 0.2s;
}
.lb-download-btn:hover { background: var(--accent); color: #fff; }

.lightbox-close {
  position: absolute;
  top: 20px;
  right: 24px;
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.lightbox-close:hover { border-color: var(--danger); color: var(--danger); }
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--bg2);
  color: var(--text);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.lightbox-nav:hover { border-color: var(--accent); }
.lightbox-nav.prev { left: 20px; }
.lightbox-nav.next { right: 20px; }

.loading {
  display: flex;
  justify-content: center;
  padding: 80px 0;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center;
  padding: 80px 0;
  color: var(--text2);
  font-size: 15px;
}
.empty.error {
  color: var(--danger);
}
.empty .error-title {
  font-size: 16px;
  font-weight: 500;
  margin-bottom: 12px;
}
.empty .error-detail {
  font-size: 12px;
  font-family: var(--mono);
  color: #f87171;
  background: rgba(239,68,68,0.08);
  border: 1px solid rgba(239,68,68,0.15);
  border-radius: 8px;
  padding: 12px 20px;
  display: inline-block;
  max-width: 600px;
  text-align: left;
  word-break: break-all;
  line-height: 1.7;
}

/* Loading Overlay */
.loading-overlay {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.5s, visibility 0.5s;
}
.loading-overlay.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
.loading-overlay .lo-spinner {
  width: 48px;
  height: 48px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
.loading-overlay .lo-text {
  font-size: 15px;
  color: var(--text2);
  letter-spacing: 0.5px;
  display: flex;
  align-items: center;
  gap: 2px;
}
.loading-overlay .lo-dots::after {
  content: '';
  animation: dots 1.4s steps(4, end) infinite;
}
@keyframes dots {
  0%  { content: ''; }
  25% { content: '.'; }
  50% { content: '..'; }
  75% { content: '...'; }
  100%{ content: '....'; }
}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="lo-spinner"></div>
  <div class="lo-text">正在连接QQ图库系统<span class="lo-dots"></span></div>
</div>

<div class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">AI</div>
      AI 图鉴
    </div>
    <div class="stats-bar" id="statsBar"></div>
  </div>
</div>

<div class="tabs" id="tabs"></div>

<div class="search-bar" id="searchBar">
  <div class="search-inner">
    <div class="search-icon">🔍</div>
    <input type="text" id="searchInput" class="search-input" placeholder="输入QQ号搜索图片..." autocomplete="off">
    <button class="search-btn" id="searchBtn" onclick="doSearch()">搜索</button>
    <button class="search-clear-btn" id="searchClearBtn" onclick="clearSearch()" style="display:none">✕ 清除</button>
  </div>
</div>

<div class="search-result-hint" id="searchHint" style="display:none"></div>

<div class="gallery-wrap">
  <div class="gallery" id="gallery"></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="source-tag">📂 图片主要来源于解构原典群</div>
    <div class="dev-credit">Developed by <span>正在加载...</span></div>
  </div>
</footer>

<div class="meta-tooltip" id="metaTooltip">
  <div class="meta-tooltip-header">📋 PNG Metadata</div>
  <div class="meta-tooltip-body" id="metaTooltipBody"></div>
</div>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">×</button>
  <button class="lightbox-nav prev" onclick="navLightbox(-1)">‹</button>
  <button class="lightbox-nav next" onclick="navLightbox(1)">›</button>
  <img id="lbImg" src="" alt="">
  <div class="lightbox-info" id="lbInfo"></div>
  <a id="lbDownload" class="lb-download-btn" download>⬇ 下载原图</a>
</div>

<script>
const API = 'https://uqililh--ai-gallery-serve.modal.run';
let currentCollection = 'ai';
let currentPage = 1;
let totalPages = 1;
let currentItems = [];
let lightboxIndex = 0;
let collections = [];
const metaCache = {};
let hoverTimer = null;
let currentHoverCard = null;
let searchQQ = '';

function showMetaTooltip(cardEl, item) {
  const tooltip = document.getElementById('metaTooltip');
  const body = document.getElementById('metaTooltipBody');
  const cacheKey = `${currentCollection}/${item.filename}`;

  const rect = cardEl.getBoundingClientRect();
  const tw = 400;
  let left = rect.right + 12;
  let top = rect.top;
  if (left + tw > window.innerWidth - 16) {
    left = rect.left - tw - 12;
  }
  if (left < 16) {
    left = Math.max(16, rect.left + rect.width / 2 - tw / 2);
    top = rect.bottom + 8;
  }
  const maxH = window.innerHeight * 0.45;
  if (top + maxH > window.innerHeight - 16) {
    top = window.innerHeight - maxH - 16;
  }
  if (top < 8) top = 8;

  tooltip.style.left = left + 'px';
  tooltip.style.top = top + 'px';
  tooltip.classList.add('visible');

  if (metaCache[cacheKey]) {
    renderMetaContent(body, metaCache[cacheKey]);
  } else {
    body.innerHTML = '<div class="meta-loading"><span class="mini-spinner"></span>加载中...</div>';
    fetch(`${API}/api/meta/${currentCollection}/${item.filename}`)
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        metaCache[cacheKey] = data;
        if (currentHoverCard === cardEl) renderMetaContent(body, data);
      })
      .catch(() => {
        if (currentHoverCard === cardEl)
          body.innerHTML = '<div class="meta-loading" style="color:var(--text2)">无元数据</div>';
      });
  }
}

function renderMetaContent(container, meta) {
  const pm = meta.png_metadata;
  if (!pm || Object.keys(pm).length === 0) {
    container.innerHTML = '<div class="meta-loading" style="color:var(--text2)">无 PNG Metadata</div>';
    return;
  }
  let html = '';
  for (const [key, value] of Object.entries(pm)) {
    const str = typeof value === 'object' ? JSON.stringify(value, null, 2) : String(value);
    const parsed = tryParseJSON(str);
    if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
      for (const [subKey, subVal] of Object.entries(parsed)) {
        if (typeof subVal === 'object' && subVal !== null) {
          const inner = typeof subVal === 'string' ? tryParseJSON(subVal) : subVal;
          if (inner && typeof inner === 'object' && !Array.isArray(inner) && Object.keys(inner).length > 1) {
            for (const [dk, dv] of Object.entries(inner)) {
              html += renderMetaRow(dk, typeof dv === 'object' ? JSON.stringify(dv) : String(dv));
            }
            continue;
          }
          html += renderMetaRow(subKey, JSON.stringify(subVal, null, 2));
        } else {
          html += renderMetaRow(subKey, String(subVal));
        }
      }
    } else {
      html += renderMetaRow(key, str);
    }
  }
  container.innerHTML = html;
}

function tryParseJSON(str) {
  if (typeof str !== 'string') return null;
  const t = str.trim();
  if ((t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'))) {
    try { return JSON.parse(t); } catch { return null; }
  }
  return null;
}

function renderMetaRow(label, value) {
  const MAX = 600;
  let v = value, trunc = false;
  if (v.length > MAX) { v = v.slice(0, MAX); trunc = true; }
  return `<div class="meta-row">
    <div class="meta-label">${escapeHtml(String(label))}</div>
    <div class="meta-value">${escapeHtml(v)}${trunc ? '<span style="color:var(--text2)"> …</span>' : ''}</div>
  </div>`;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hideMetaTooltip() {
  document.getElementById('metaTooltip').classList.remove('visible');
  currentHoverCard = null;
}

let tooltipHovered = false;

document.getElementById('metaTooltip').addEventListener('mouseenter', () => {
  tooltipHovered = true;
  clearTimeout(hoverTimer);
});

document.getElementById('metaTooltip').addEventListener('mouseleave', (e) => {
  tooltipHovered = false;
  const related = e.relatedTarget;
  if (related && currentHoverCard && currentHoverCard.contains(related)) return;
  hideMetaTooltip();
});

document.getElementById('gallery').addEventListener('mouseover', e => {
  const card = e.target.closest('.card');
  if (!card || currentCollection !== 'ai') return;
  if (currentHoverCard === card) return;
  clearTimeout(hoverTimer);
  currentHoverCard = card;
  const idx = parseInt(card.dataset.idx);
  if (isNaN(idx)) return;
  hoverTimer = setTimeout(() => {
    showMetaTooltip(card, currentItems[idx]);
  }, 300);
});

document.getElementById('gallery').addEventListener('mouseout', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const related = e.relatedTarget;
  if (related && card.contains(related)) return;
  const tooltip = document.getElementById('metaTooltip');
  if (related && (tooltip === related || tooltip.contains(related))) return;
  clearTimeout(hoverTimer);
  hoverTimer = setTimeout(() => {
    if (!tooltipHovered) hideMetaTooltip();
  }, 100);
});

function quickSearchQQ(qq) {
  document.getElementById('searchInput').value = qq;
  doSearch();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function init() {
  try {
    const res = await fetch(`${API}/api/collections`);
    const data = await res.json();
    collections = data.collections;
    renderTabs();
    await Promise.all([loadStats(), loadImages()]);
    document.getElementById('loadingOverlay').classList.add('hidden');
  } catch (e) {
    document.getElementById('gallery').innerHTML =
      `<div class="empty error">
        <div class="error-title">⚠ 无法连接后端服务</div>
        <div class="error-detail">${e.name}: ${e.message}<br>API: ${API}/api/collections</div>
      </div>`;
    document.getElementById('loadingOverlay').classList.add('hidden');
  }
}

async function loadStats() {
  try {
    const res = await fetch(`${API}/api/stats`);
    const data = await res.json();
    const bar = document.getElementById('statsBar');
    let html = '';
    for (const [k, v] of Object.entries(data)) {
      html += `<div class="stat-item">${v.label}: <span>${v.count}</span> 张 / <span>${v.total_size_mb}</span> MB</div>`;
    }
    bar.innerHTML = html;
  } catch (e) {}
}

function renderTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = collections.map(c => `
    <div class="tab ${c.key === currentCollection ? 'active' : ''}"
         onclick="switchTab('${c.key}')">
      ${c.label}
      <span class="tab-count">${c.count}</span>
    </div>
  `).join('');
}

function switchTab(key) {
  currentCollection = key;
  currentPage = 1;
  searchQQ = '';
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClearBtn').style.display = 'none';
  document.getElementById('searchHint').style.display = 'none';
  renderTabs();
  loadImages();
}

function doSearch() {
  const val = document.getElementById('searchInput').value.trim();
  if (!val) return;
  searchQQ = val;
  currentPage = 1;
  document.getElementById('searchClearBtn').style.display = '';
  document.getElementById('searchHint').style.display = '';
  document.getElementById('searchHint').innerHTML = `搜索 QQ: <span>${escapeHtml(val)}</span> 的图片...`;
  loadImages().then(() => {
    const hint = document.getElementById('searchHint');
    const total = document.querySelector('.page-info');
    hint.innerHTML = `QQ: <span>${escapeHtml(searchQQ)}</span> — 共找到 <span>${currentItems.length > 0 ? document.getElementById('pagination').querySelector('.page-info')?.textContent || '' : '0'}</span> 页结果`;
  });
}

function clearSearch() {
  searchQQ = '';
  currentPage = 1;
  document.getElementById('searchInput').value = '';
  document.getElementById('searchClearBtn').style.display = 'none';
  document.getElementById('searchHint').style.display = 'none';
  loadImages();
}

document.getElementById('searchInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') doSearch();
});

async function loadImages() {
  const gallery = document.getElementById('gallery');
  gallery.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

  try {
    let url = `${API}/api/images/${currentCollection}?page=${currentPage}`;
    if (searchQQ) url += `&qq_sender=${encodeURIComponent(searchQQ)}`;
    const res = await fetch(url);
    const data = await res.json();
    totalPages = data.total_pages;
    currentItems = data.items;

    if (currentItems.length === 0) {
      gallery.innerHTML = '<div class="empty">暂无图片</div>';
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    gallery.innerHTML = currentItems.map((item, i) => {
      const isBlurred = item.safety === 'nsfw';
      return `
      <div class="card" data-idx="${i}" onclick="openLightbox(${i})" style="animation-delay:${i * 0.04}s">
        <div class="card-img-wrap">
          <img src="${API}${item.thumb_url}" alt="${item.filename}" loading="lazy">
          ${isBlurred ? `<div class="blur-overlay"><span class="blur-hint">已处理</span></div>` : ''}
        </div>
        <div class="card-info">
          <div class="card-filename">${item.filename}</div>
          <div class="card-meta">
            <span>${item.width && item.height ? item.width + '×' + item.height : ''}</span>
            ${item.software ? `<span class="card-tag ${getTagClass(item.software)}">${item.software}</span>` : ''}
          </div>
          ${item.qq_sender ? `<div class="card-meta" style="margin-top:2px">
            <span class="card-qq" onclick="event.stopPropagation();quickSearchQQ('${item.qq_sender}')" title="点击搜索该QQ的所有图片">QQ: ${item.qq_sender}</span>
            ${item.group_name ? `<span style="font-size:10px;color:var(--text2)">${item.group_name}</span>` : ''}
          </div>` : ''}
        </div>
      </div>`;
    }).join('');

    renderPagination();
  } catch (e) {
    gallery.innerHTML =
      `<div class="empty error">
        <div class="error-title">⚠ 加载失败</div>
        <div class="error-detail">${e.name}: ${e.message}<br>API: ${API}/api/images/${currentCollection}?page=${currentPage}</div>
      </div>`;
  }
}

function getTagClass(sw) {
  const s = sw.toLowerCase();
  if (s.includes('novelai'))  return 'tag-novelai';
  if (s.includes('comfyui'))  return 'tag-comfyui';
  if (s.includes('webui'))    return 'tag-webui';
  if (s === 'unknown')        return 'tag-unknown';
  return 'tag-default';
}

function renderPagination() {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹</button>`;
  const range = getPageRange(currentPage, totalPages, 5);
  for (const p of range) {
    if (p === '...') {
      html += `<span class="page-info">…</span>`;
    } else {
      html += `<button class="page-btn ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
    }
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>›</button>`;
  html += `<span class="page-info">${currentPage}/${totalPages}</span>`;
  container.innerHTML = html;
}

function getPageRange(current, total, delta) {
  const range = [];
  const left = Math.max(2, current - delta);
  const right = Math.min(total - 1, current + delta);
  range.push(1);
  if (left > 2) range.push('...');
  for (let i = left; i <= right; i++) range.push(i);
  if (right < total - 1) range.push('...');
  if (total > 1) range.push(total);
  return range;
}

function goPage(p) {
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  loadImages();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function openLightbox(index) {
  lightboxIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function navLightbox(dir) {
  lightboxIndex = (lightboxIndex + dir + currentItems.length) % currentItems.length;
  updateLightbox();
}

function updateLightbox() {
  const item = currentItems[lightboxIndex];
  document.getElementById('lbImg').src = `${API}${item.url}`;

  const parts = [];
  if (item.filename) parts.push(item.filename);
  if (item.width && item.height) parts.push(`<span>${item.width}×${item.height}</span>`);
  if (item.software) parts.push(`<span>${item.software}</span>`);
  if (item.group_name) parts.push(`群: <span>${item.group_name}</span>`);
  if (item.qq_sender) parts.push(`QQ: <span>${item.qq_sender}</span>`);
  if (item.file_date) parts.push(`<span>${item.file_date}</span>`);
  document.getElementById('lbInfo').innerHTML = parts.join(' &nbsp;·&nbsp; ');

  document.getElementById('lbDownload').href = `${API}${item.url}${item.url.includes('?') ? '&' : '?'}raw=1`;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') navLightbox(-1);
  if (e.key === 'ArrowRight') navLightbox(1);
});

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});

init();
</script>
</body>
</html>
